name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, k3s]
    env:
      KUBECONFIG: /home/samet/.kube/config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sametyaprak/prettier-home-backend:latest .

      - name: Push to Docker Hub
        run: docker push sametyaprak/prettier-home-backend:latest

      - name: Deploy to k3s
        run: |
          kubectl rollout restart deployment/backend -n prettier-home
          kubectl rollout status deployment/backend -n prettier-home --timeout=300s
