
server:
  port: 8080
  error:
    #    include-stacktrace: never
    include-binding-errors: always
    include-message: always

spring:
  web:
    locale: auto
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: -1
    fallback-to-system-locale: true
  profiles:
    include:
      - security
      - data
      - mail
  sql:
    init:
      mode: always

#ExportFilePath
export:
  folder:
    path:
      xls: ${user.home}/Desktop/.prettierReports

