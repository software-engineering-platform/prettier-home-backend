# Gmail SMTP
spring:
  mail:
    default-encoding: UTF-8
    host: smtp.gmail.com
    port: 587
    username: prettier-homes-noreply@gmail.com
    password: <hereyourmailpassword>
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

email:
  account:
    activate:
      subject: Activation Email
      template: email-activate-template.ftl
      email-img: activate.png
      text: |
        <p>Thank you for registering!</p>
        <p>To activate your account, please click on the following link:</p>
        <p><a href="${link}">${link}</a></p>
    forgot:
      subject: Forgot Password
      template: email-forgot-template.ftl
      email-img: forgot-password.png
      text: |
        <p>If you forgot your password, please use the code below to reset it:</p>
        <p>${code}</p>
        <p>If you did not request a password reset, please ignore this email</p>